name: Manual Magisk Module Build

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 26.07 for Magisk module, leave empty for git-based)'
        required: false
        default: ''

jobs:
  build_magisk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
          build-scan-publish: false
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Magisk Module APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            ./gradlew assembleOnlineStableRelease assembleOfflineStableRelease \
              -PAPP_ID="com.android.packageinstaller" \
              -PVERSION_NAME="${{ inputs.version_name }}"
          else
            ./gradlew assembleOnlineStableRelease assembleOfflineStableRelease \
              -PAPP_ID="com.android.packageinstaller"
          fi

      - name: Upload Online APK
        uses: actions/upload-artifact@v7
        with:
          name: magisk-online-apk
          path: app/build/outputs/apk/onlineStable/release/*.apk
          retention-days: 90
          archive: false

      - name: Upload Offline APK
        uses: actions/upload-artifact@v7
        with:
          name: magisk-offline-apk
          path: app/build/outputs/apk/offlineStable/release/*.apk
          retention-days: 90
          archive: false
